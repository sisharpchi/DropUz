services:
  dropuz.db:
    image: postgres:16-alpine
    container_name: dropuz-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dropuz-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  dropuz.migrator:
    image: ${DOCKER_REGISTRY-}dropuzmigrator
    container_name: dropuz-migrator
    build:
      context: .
      dockerfile: src/Tools/DropUz.Tools.DbMigrator/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__Database: "Host=dropuz.db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    depends_on:
      dropuz.db:
        condition: service_healthy
    restart: "no"

  dropuz.api:
    image: ${DOCKER_REGISTRY-}dropuzapi
    container_name: dropuz-api
    build:
      context: .
      dockerfile: src/Api/DropUz.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__Database: "Host=dropuz.db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Api__Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:5173}
      Identity__OpenIddict__AllowInsecureHttp: ${IDENTITY_ALLOW_INSECURE_HTTP:-false}
      Outbox__Enabled: ${OUTBOX_ENABLED:-true}
      Outbox__BatchSize: ${OUTBOX_BATCH_SIZE:-20}
      Outbox__PollIntervalSeconds: ${OUTBOX_POLL_INTERVAL_SECONDS:-15}
      Notifications__Delivery__Enabled: ${NOTIFICATION_DELIVERY_ENABLED:-true}
      Notifications__Delivery__BatchSize: ${NOTIFICATION_DELIVERY_BATCH_SIZE:-20}
      Notifications__Delivery__PollIntervalSeconds: ${NOTIFICATION_DELIVERY_POLL_INTERVAL_SECONDS:-15}
      Cargo__ExpirationJob__Enabled: ${CARGO_EXPIRATION_JOB_ENABLED:-true}
      Cargo__ExpirationJob__PollIntervalMinutes: ${CARGO_EXPIRATION_POLL_INTERVAL_MINUTES:-15}
    ports:
      - "${API_HTTP_PORT:-8080}:8080"
    depends_on:
      dropuz.migrator:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  dropuz-postgres-data:
